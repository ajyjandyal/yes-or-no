<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Do You Love Me? ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button onclick="goToGame()">Click me 💖</button>
  <div class="screen" id="screenGame">
  <h1>Catch my heart 💖</h1>
  <p>Click it 3 times to unlock something special 😉</p>
  <div id="heart">💖</div>
  <p id="score">0 / 3</p>
</div>

  <div class="container">
    <h1>Do you love me? 💖</h1>

    <div class="buttons">
      <button id="yesBtn">Yes 😍</button>
      <button id="noBtn">No 😢</button>
    </div>

    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
