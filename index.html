<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Screen 1 -->
  <div class="screen active" id="screen1">
    <h1 id="typing"></h1>
    <button onclick="nextScreen()">Next ➡️</button>
  </div>

  <!-- Screen 2 -->
  <div class="screen" id="screen2">
    <h1>From the day I met you... 💫</h1>
    <p>You made everything better ❤️</p>
    <button onclick="nextScreen()">Next ➡️</button>
  </div>

  <!-- Screen 3 -->
  <div class="screen" id="screen3">
    <h1>And I just want to say...</h1>
    <button onclick="goToGame()">Click me 💖</button>
  </div>

  <!-- Mini Game -->
  <div class="screen" id="screenGame">
    <h1>Catch my heart 💖</h1>
    <p>Click it 3 times to unlock something special 😉</p>
    <div id="heart">💖</div>
    <p id="score">0 / 3</p>
  </div>

  <!-- Final Proposal -->
  <div class="screen" id="screen4">
    <h1>Do you love me? 💖</h1>
    <div class="buttons">
      <button id="yesBtn">Yes 😍</button>
      <button id="noBtn">No 😢</button>
    </div>
    <p id="message"></p>
  </div>

  <!-- Music -->
  <audio loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
